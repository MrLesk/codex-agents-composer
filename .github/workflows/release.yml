name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.5

      - name: Apply release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/sync-version.mjs set-version-from-release-tag "$RELEASE_TAG"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run build:release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ runner.os }}
          path: artifacts/*
          if-no-files-found: error

  attach-and-sync-version:
    name: Attach Assets And Sync Version
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Attach assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release-artifacts/* --clobber

      - name: Checkout default branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply release version on default branch
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/sync-version.mjs set-version-from-release-tag "$RELEASE_TAG"

      - name: Commit and push version bump
        run: |
          git add package.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: set version to ${PACKAGE_VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
