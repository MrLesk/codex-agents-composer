name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: ubuntu-latest
            label: Linux
          - os: windows-latest
            label: Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.5

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: release-bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            release-bun-${{ runner.os }}-

      - name: Configure macOS signing credentials
        if: runner.os == 'macOS'
        shell: bash
        env:
          ELECTROBUN_APPLEAPIISSUER: ${{ secrets.ELECTROBUN_APPLEAPIISSUER }}
          ELECTROBUN_APPLEAPIKEY: ${{ secrets.ELECTROBUN_APPLEAPIKEY }}
          ELECTROBUN_APPLEAPIKEY_P8: ${{ secrets.ELECTROBUN_APPLEAPIKEY_P8 }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
        run: |
          if [[ -z "$ELECTROBUN_DEVELOPER_ID" ]]; then
            echo "::error::Missing macOS signing secret ELECTROBUN_DEVELOPER_ID."
            exit 1
          fi

          echo "ELECTROBUN_DEVELOPER_ID=$ELECTROBUN_DEVELOPER_ID" >> "$GITHUB_ENV"

          if [[ -n "$ELECTROBUN_APPLEAPIISSUER" && -n "$ELECTROBUN_APPLEAPIKEY" && -n "$ELECTROBUN_APPLEAPIKEY_P8" ]]; then
            key_path="$RUNNER_TEMP/electrobun-api-key.p8"
            printf '%s' "$ELECTROBUN_APPLEAPIKEY_P8" > "$key_path"
            echo "ELECTROBUN_APPLEAPIISSUER=$ELECTROBUN_APPLEAPIISSUER" >> "$GITHUB_ENV"
            echo "ELECTROBUN_APPLEAPIKEY=$ELECTROBUN_APPLEAPIKEY" >> "$GITHUB_ENV"
            echo "ELECTROBUN_APPLEAPIKEYPATH=$key_path" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -n "$ELECTROBUN_APPLEID" && -n "$ELECTROBUN_APPLEIDPASS" && -n "$ELECTROBUN_TEAMID" ]]; then
            echo "ELECTROBUN_APPLEID=$ELECTROBUN_APPLEID" >> "$GITHUB_ENV"
            echo "ELECTROBUN_APPLEIDPASS=$ELECTROBUN_APPLEIDPASS" >> "$GITHUB_ENV"
            echo "ELECTROBUN_TEAMID=$ELECTROBUN_TEAMID" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::error::Missing notarization secrets. Provide either ELECTROBUN_APPLEAPIISSUER/ELECTROBUN_APPLEAPIKEY/ELECTROBUN_APPLEAPIKEY_P8 or ELECTROBUN_APPLEID/ELECTROBUN_APPLEIDPASS/ELECTROBUN_TEAMID."
          exit 1

      - name: Apply release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/sync-version.mjs set-version-from-release-tag

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: bun run build:release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-${{ runner.os }}
          path: artifacts/*
          if-no-files-found: error

  attach-and-sync-version:
    name: Attach Assets And Sync Version
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Download workflow artifacts
        uses: actions/download-artifact@v8.0.0
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Prepare release asset names
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/prepare-release-assets.mjs release-artifacts release-upload

      - name: Attach assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$RELEASE_TAG" release-upload/* --clobber --repo "$GH_REPO"

      - name: Setup git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply release version on default branch
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node scripts/sync-version.mjs set-version-from-release-tag

      - name: Commit and push version bump
        run: |
          git add package.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: set version to ${PACKAGE_VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
